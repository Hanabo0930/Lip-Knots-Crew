name: Release Candidate Checks

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build, regression tests and high-severity audit
        run: npm run verify

  # Production deploy is intentionally absent.
  # Add a protected environment and manual approval before enabling.
